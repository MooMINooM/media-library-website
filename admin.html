        body {
            font-family: 'Sarabun', sans-serif;
        }

        /* Sidebar scrollbar */
        .sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
        }

        .sidebar-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Menu group animation */
        .menu-group-items {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
            opacity: 0;
        }

        .menu-group-items.open {
            max-height: 500px;
            opacity: 1;
        }

        /* Active menu item */
        .admin-menu-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.15));
            color: #a5b4fc;
            border-left: 3px solid #818cf8;
        }

        /* Menu group header */
        .menu-group-header {
            transition: all 0.2s ease;
        }

        .menu-group-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-group-header .chevron {
            transition: transform 0.3s ease;
        }

        .menu-group-header.expanded .chevron {
            transform: rotate(90deg);
        }

        /* Fade in animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Modal backdrop */
        @keyframes modalFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>

                    { type: "header", label: "--- 5. สื่อ & Social & แผนที่ ---" },
                    { key: "vtr_url", label: "VTR (Youtube Link)", type: "url" },
                    { key: "song_url", label: "เพลงโรงเรียน (File URL)", type: "url" },
                    { key: "facebook", label: "Facebook URL", type: "url" },
                    { key: "youtube", label: "Youtube Channel URL", type: "url" },
                    { key: "map_embed", label: "Google Maps Embed Code (วางโค้ด iframe ที่นี่)", type: "textarea", rows: 4 },

                    { type: "header", label: "--- 6. ป๊อปอัพประกาศพิเศษ (Popup Announcement) ---" },
                    { key: "popup_img", label: "URL รูปภาพประกาศ (แสดงเมื่อเข้าเว็บ)", type: "url" },
                    { key: "show_popup", label: "สถานะการแสดงป๊อปอัพ", type: "select", options: ["เปิดใช้งาน", "ปิดการใช้งาน"] }
                ]
            },

            personnel: { title: "บุคลากรปัจจุบัน", fields: [{ key: "name", label: "ชื่อ-สกุล", type: "text", required: true }, { key: "role", label: "ตำแหน่ง", type: "text", required: true }, { key: "image", label: "รูปภาพ (URL)", type: "url" }] },
            personnel_history: { title: "ทำเนียบบุคลากร", fields: [{ key: "name", label: "ชื่อ-สกุล", type: "text" }, { key: "role", label: "ตำแหน่ง", type: "text" }, { key: "year", label: "ปี/วาระ (เช่น 2560-2564)", type: "text" }, { key: "image", label: "รูปภาพ (URL)", type: "url" }] },
            student_data: { title: "ข้อมูลจำนวนนักเรียน", fields: [{ key: "grade", label: "ระดับชั้น", type: "text" }, { key: "male", label: "ชาย (คน)", type: "number" }, { key: "female", label: "หญิง (คน)", type: "number" }] },
            school_board: { title: "คณะกรรมการสถานศึกษา", fields: [{ key: "name", label: "ชื่อ-สกุล", type: "text" }, { key: "role", label: "ตำแหน่ง", type: "text" }, { key: "image", label: "รูปภาพ (URL)", type: "url" }] },
            student_council: { title: "สภานักเรียน", fields: [{ key: "name", label: "ชื่อ-สกุล", type: "text" }, { key: "role", label: "ตำแหน่ง", type: "text" }, { key: "image", label: "รูปภาพ (URL)", type: "url" }] },
            news: { title: "ข่าวประชาสัมพันธ์", fields: [{ key: "title", label: "หัวข้อข่าว", type: "text", required: true }, { key: "academic_year", label: "ปีการศึกษา (เช่น 2568)", type: "text" }, { key: "date", label: "วันที่", type: "date" }, { key: "image", label: "รูปภาพ (URL)", type: "url" }, { key: "link", label: "ลิงก์อ่านต่อ", type: "url" }] },
            eservices: { title: "ลิงก์ระบบสารสนเทศ", fields: [{ key: "title", label: "ชื่อระบบ", type: "text", required: true }, { key: "url", label: "URL ปลายทาง", type: "url", required: true }] },
            onet: { title: "ผลสัมฤทธิ์ O-NET", fields: [{ key: "title", label: "ชื่อเอกสาร", type: "text" }, { key: "tag", label: "ปีการศึกษา", type: "text" }, { key: "file_url", label: "ไฟล์ (URL)", type: "url" }, { key: "date", label: "วันที่", type: "date" }] },
            nt: { title: "ผลสัมฤทธิ์ NT", fields: [{ key: "title", label: "ชื่อเอกสาร", type: "text" }, { key: "tag", label: "ปีการศึกษา", type: "text" }, { key: "file_url", label: "ไฟล์ (URL)", type: "url" }, { key: "date", label: "วันที่", type: "date" }] },
            rt: { title: "ผลสัมฤทธิ์ RT", fields: [{ key: "title", label: "ชื่อเอกสาร", type: "text" }, { key: "tag", label: "ปีการศึกษา", type: "text" }, { key: "file_url", label: "ไฟล์ (URL)", type: "url" }, { key: "date", label: "วันที่", type: "date" }] },
            teacher_awards: { title: "ผลงานครู", fields: [{ key: "name", label: "ชื่อครู", type: "text" }, { key: "title", label: "รางวัล", type: "text" }, { key: "program", label: "รายการ", type: "text" }, { key: "competition", label: "รายการแข่ง", type: "text" }, { key: "image", label: "รูปภาพ/เกียรติบัตร", type: "url" }] },
            student_awards: { title: "ผลงานนักเรียน", fields: [{ key: "students", label: "ชื่อนักเรียน", type: "text" }, { key: "title", label: "รางวัล", type: "text" }, { key: "program", label: "รายการ", type: "text" }, { key: "competition", label: "รายการแข่ง", type: "text" }, { key: "image", label: "รูปภาพ/เกียรติบัตร", type: "url" }] },
            school_awards: { title: "ผลงานโรงเรียน", fields: [{ key: "title", label: "ชื่อรางวัล", type: "text" }, { key: "date", label: "วันที่", type: "date" }, { key: "image", label: "รูปภาพ", type: "url" }] },
            innovations: { title: "นวัตกรรม", fields: [{ key: "title", label: "ชื่อนวัตกรรม", type: "text" }, { key: "creator", label: "ผู้จัดทำ", type: "text" }, { key: "subject", label: "วิชา", type: "text" }, { key: "class", label: "ระดับชั้น", type: "text" }, { key: "fileUrl", label: "ไฟล์ผลงาน (URL)", type: "url" }, { key: "coverImageUrl", label: "รูปปก (URL)", type: "url" }] },
            documents: { title: "เอกสารราชการ", fields: [{ key: "title", label: "ชื่อเอกสาร", type: "text" }, { key: "category", label: "หมวดหมู่", type: "text" }, { key: "fileUrl", label: "ไฟล์ (URL)", type: "url" }, { key: "uploadDate", label: "วันที่", type: "date" }] },
            forms: { title: "แบบฟอร์ม", fields: [{ key: "title", label: "ชื่อแบบฟอร์ม", type: "text" }, { key: "category", label: "หมวดหมู่", type: "text" }, { key: "fileUrl", label: "ไฟล์ (URL)", type: "url" }, { key: "uploadDate", label: "วันที่", type: "date" }] }
        };

        let currentSection, currentData;
        async function checkAuth() { try { const { data: { session } } = await supabaseAdmin.auth.getSession(); if (!session) window.location.href = 'index.html'; } catch (e) { } } checkAuth();
        async function logout() { await supabaseAdmin.auth.signOut(); window.location.href = 'index.html'; }

        async function loadSection(sec) {
            currentSection = sec; const s = SCHEMAS[sec];
            const main = document.getElementById('main-area');
            main.innerHTML = `<div class="h-full flex items-center justify-center"><div class="flex flex-col items-center gap-3"><div class="w-12 h-12 rounded-2xl bg-indigo-50 flex items-center justify-center"><i class="fa-solid fa-spinner fa-spin text-2xl text-indigo-500"></i></div><p class="text-sm text-slate-400 font-medium">กำลังโหลดข้อมูล...</p></div></div>`;

            // Update breadcrumb
            document.getElementById('breadcrumb-text').textContent = s.title;

            // Update active menu
            document.querySelectorAll('.admin-menu-item').forEach(el => el.classList.remove('active'));
            if (event && event.currentTarget) event.currentTarget.classList.add('active');

            if (sec === 'school_info') {
                const { data } = await supabaseAdmin.from(sec).select('*').limit(1).single();
                renderForm(data || {});
            } else {
                const { data } = await supabaseAdmin.from(sec).select('*').order('id', { ascending: false });
                currentData = data; renderList(s);
            }
        }

        function renderForm(data) {
            const f = SCHEMAS['school_info'].fields.map(field => {
                if (field.type === 'header') return `<div class="pt-6 pb-2 first:pt-0"><h3 class="font-bold text-indigo-600 text-sm tracking-wide flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>${field.label.replace(/---/g, '').trim()}</h3><div class="h-px bg-gradient-to-r from-indigo-100 to-transparent mt-2"></div></div>`;
                let val = data[field.key] || '';

                if (field.key === 'show_popup') {
                    val = (data[field.key] === true) ? "เปิดใช้งาน" : "ปิดการใช้งาน";
                }

                let inp;
                const inputClass = "w-full border border-slate-200 px-4 py-2.5 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all bg-white text-sm hover:border-slate-300";

                if (field.type === 'textarea') {
                    inp = `<textarea id="si-${field.key}" class="${inputClass} resize-none" rows="${field.rows}">${val}</textarea>`;
                } else if (field.type === 'color') {
                    inp = `<div class="flex items-center gap-3"><input type="color" id="si-${field.key}" value="${val || '#000000'}" class="h-10 w-16 border border-slate-200 rounded-xl cursor-pointer"><span class="text-xs text-slate-400">เลือกสี</span></div>`;
                } else if (field.type === 'select') {
                    inp = `<select id="si-${field.key}" class="${inputClass}">
                        ${field.options.map(opt => `<option value="${opt}" ${val === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                    </select>`;
                } else {
                    inp = `<input type="${field.type}" id="si-${field.key}" value="${val}" class="${inputClass}">`;
                }

                return `<div><label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wider">${field.label}</label>${inp}</div>`;
            }).join('');

            document.getElementById('main-area').innerHTML = `<div class="max-w-4xl mx-auto animate-fade-in-up">
                <div class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100">
                    <div class="flex items-center gap-3 mb-8 pb-6 border-b border-slate-100">
                        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white text-lg shadow-lg shadow-indigo-500/30">
                            <i class="fa-solid fa-school"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-slate-800">ข้อมูลโรงเรียน</h2>
                            <p class="text-xs text-slate-400">จัดการข้อมูลพื้นฐานของสถานศึกษา</p>
                        </div>
                    </div>
                    <form id="school-info-form" class="space-y-4">
                        <input type="hidden" id="si-id" value="${data.id || ''}">
                        ${f}
                        <div class="pt-6">
                            <button type="button" onclick="saveSchoolInfo()" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-indigo-500/20 hover:shadow-xl hover:shadow-indigo-500/30 transition-all text-sm flex items-center justify-center gap-2">
                                <i class="fa-solid fa-floppy-disk"></i> บันทึกข้อมูลโรงเรียน
                            </button>
                        </div>
                    </form>
                </div>
            </div>`;
        }

        async function saveSchoolInfo() {
            const data = {}; const id = document.getElementById('si-id').value;
            SCHEMAS['school_info'].fields.forEach(f => {
                if (f.key) {
                    let val = document.getElementById(`si-${f.key}`).value;
                    if (f.key === 'show_popup') {
                        data[f.key] = (val === "เปิดใช้งาน");
                    } else {
                        data[f.key] = val;
                    }
                }
            });
            const { error } = id ? await supabaseAdmin.from('school_info').update(data).eq('id', id) : await supabaseAdmin.from('school_info').insert([data]);
            if (error) Swal.fire({ icon: 'error', title: 'Error', text: error.message, confirmButtonColor: '#6366f1' });
            else Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'บันทึกเรียบร้อย', confirmButtonColor: '#6366f1' });
        }

        function renderList(s) {
            const main = document.getElementById('main-area'); const key = s.fields[0].key;
            let h = `<div class="animate-fade-in-up">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white text-sm shadow-lg shadow-indigo-500/30">
                            <i class="fa-solid fa-database"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-slate-800">${s.title}</h2>
                            <p class="text-xs text-slate-400">${currentData ? currentData.length : 0} รายการ</p>
                        </div>
                    </div>
                    <button onclick="openModal()" class="bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-500/20 font-semibold flex items-center gap-2 text-sm transition-all hover:shadow-xl hover:shadow-indigo-500/30">
                        <i class="fa-solid fa-plus"></i> เพิ่มข้อมูล
                    </button>
                </div>
                <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
                    <div class="divide-y divide-slate-50">`;

            if (!currentData || !currentData.length) {
                h += `<div class="p-12 text-center">
                    <div class="w-16 h-16 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-300 text-2xl mx-auto mb-3"><i class="fa-solid fa-inbox"></i></div>
                    <p class="text-slate-400 font-medium">ยังไม่มีข้อมูล</p>
                    <p class="text-xs text-slate-300 mt-1">กดปุ่ม "เพิ่มข้อมูล" เพื่อเริ่มต้น</p>
                </div>`;
            } else {
                currentData.forEach(i => {
                    const imgUrl = i.image || i.imageUrl || i.coverImageUrl || null;
                    const thumbHtml = imgUrl
                        ? `<div class="w-10 h-10 rounded-xl overflow-hidden border border-slate-200 flex-shrink-0"><img src="${imgUrl}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\'w-full h-full bg-indigo-50 flex items-center justify-center text-indigo-400 text-xs\'><i class=\'fa-solid fa-image\'></i></div>'"></div>`
                        : `<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-50 to-violet-50 text-indigo-500 flex items-center justify-center font-bold text-sm border border-indigo-100/50 flex-shrink-0">${i.id}</div>`;
                    const subInfo = i.academic_year ? `<span class="text-xs text-slate-400 ml-2 bg-blue-50 text-blue-500 px-1.5 py-0.5 rounded font-medium">ปี ${i.academic_year}</span>` : (i.date ? `<span class="text-xs text-slate-400 ml-2">${i.date}</span>` : '');
                    h += `<div class="px-5 py-4 flex justify-between items-center hover:bg-slate-50/80 transition-all group">
                    <div class="flex items-center gap-4">
                        ${thumbHtml}
                        <div>
                            <div class="font-semibold text-slate-700 text-sm group-hover:text-indigo-600 transition-colors">${i[key] || '-'}</div>
                            ${subInfo}
                        </div>
                    </div>
                    <div class="flex gap-2 opacity-50 group-hover:opacity-100 transition-opacity">
                        <button onclick="editItem('${i.id}')" class="w-9 h-9 rounded-xl bg-indigo-50 text-indigo-500 hover:bg-indigo-100 flex items-center justify-center transition-all text-xs">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button onclick="deleteItem('${i.id}')" class="w-9 h-9 rounded-xl bg-red-50 text-red-500 hover:bg-red-100 flex items-center justify-center transition-all text-xs">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>`;
                });
            }
            h += `</div></div></div>`; main.innerHTML = h;
        }

        function openModal(isEdit = false, id = null) {
            const schema = SCHEMAS[currentSection];
            document.getElementById('modal-title').innerHTML = `<div class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center"><i class="fa-solid fa-${isEdit ? 'pen-to-square' : 'plus-circle'} text-indigo-500 text-sm"></i></div> ${isEdit ? 'แก้ไขข้อมูล' : 'เพิ่มข้อมูลใหม่'}`;
            document.getElementById('field-id').value = id || '';
            let item = (isEdit && id) ? currentData.find(d => d.id == id) || {} : {};
            const inputClass = "w-full border border-slate-200 px-4 py-2.5 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all bg-white text-sm hover:border-slate-300";
            document.getElementById('form-fields').innerHTML = schema.fields.map(f => {
                if (f.type === 'header') return '';
                let val = item[f.key] || '';
                let inp = f.type === 'select' ? `<select name="${f.key}" class="${inputClass}">${f.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}</select>` : `<input type="${f.type}" name="${f.key}" value="${val}" class="${inputClass}" ${f.required ? 'required' : ''}>`;
                return `<div class="mb-4"><label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wider">${f.label}</label>${inp}</div>`;
            }).join('');
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        window.editItem = (id) => openModal(true, id);

        async function submitForm() {
            const form = document.getElementById('data-form'); if (!form.checkValidity()) { form.reportValidity(); return; }
            const formData = new FormData(form); const data = Object.fromEntries(formData.entries());
            const id = data.id; delete data.id; Object.keys(data).forEach(k => { if (data[k] === '') data[k] = null; });
            const { error } = id ? await supabaseAdmin.from(currentSection).update(data).eq('id', id) : await supabaseAdmin.from(currentSection).insert([data]);
            if (error) Swal.fire({ icon: 'error', title: 'Error', text: error.message, confirmButtonColor: '#6366f1' });
            else { closeModal(); loadSection(currentSection); Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'บันทึกข้อมูลเรียบร้อย', confirmButtonColor: '#6366f1' }); }
        }
        async function deleteItem(id) {
            const result = await Swal.fire({
                title: 'ยืนยันการลบ?',
                text: 'ข้อมูลนี้จะถูกลบถาวร',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'ลบ',
                cancelButtonText: 'ยกเลิก'
            });
            if (!result.isConfirmed) return;
            const { error } = await supabaseAdmin.from(currentSection).delete().eq('id', id);
            if (!error) loadSection(currentSection);
        }
    </script>
</body>
