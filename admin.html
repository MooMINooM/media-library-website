<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏫</text></svg>">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'] } } }
        }
    </script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
        }

        /* Sidebar scrollbar */
        .sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
        }

        .sidebar-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Menu group animation */
        .menu-group-items {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
            opacity: 0;
        }

        .menu-group-items.open {
            max-height: 500px;
            opacity: 1;
        }

        /* Active menu item */
        .admin-menu-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.15));
            color: #a5b4fc;
            border-left: 3px solid #818cf8;
        }

        /* Menu group header */
        .menu-group-header {
            transition: all 0.2s ease;
        }

        .menu-group-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-group-header .chevron {
            transition: transform 0.3s ease;
        }

        .menu-group-header.expanded .chevron {
            transform: rotate(90deg);
        }

        /* Fade in animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Upload image button */
        .upload-img-btn {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 42px;
            border-radius: 12px;
            border: 1.5px dashed #cbd5e1;
            background: #f8fafc;
            color: #64748b;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .upload-img-btn:hover {
            border-color: #6366f1;
            background: #eef2ff;
            color: #6366f1;
        }

        .upload-img-btn.uploading {
            border-color: #6366f1;
            background: #eef2ff;
            color: #6366f1;
            pointer-events: none;
        }

        .img-preview-thumb {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            object-fit: cover;
            border: 1.5px solid #e2e8f0;
            flex-shrink: 0;
            display: none;
        }

        .img-field-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .img-field-wrap input {
            flex: 1;
            min-width: 0;
        }

        .gdrive-btn {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 0 11px;
            height: 42px;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            background: #fff;
            color: #64748b;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .gdrive-btn:hover {
            border-color: #4285f4;
            background: #f0f5ff;
            color: #4285f4;
        }

        .gdrive-converted {
            animation: gdrive-flash 0.5s ease;
        }

        @keyframes gdrive-flash {
            0% {
                background: #d1fae5;
            }

            100% {
                background: transparent;
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Modal backdrop */
        @keyframes modalFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>

        window.openGalleryUpload = async function (albumId, folderPath) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = async () => {
                const files = Array.from(input.files);
                if (!files.length) return;
                let successCount = 0;
                let lastError = null;
                const total = files.length;
                Swal.fire({
                    title: 'กำลังอัปโหลด...',
                    html: `<div class="text-sm text-slate-500">0 / ${total} ไฟล์</div>`,
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    didOpen: () => Swal.showLoading()
                });
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const fixedFile = await _getFixedFile(file);
                    const filePath = `${folderPath}/${fixedFile.name}`;
                    const { error } = await supabaseAdmin.storage.from('gallery').upload(filePath, fixedFile, {
                        upsert: true,
                        contentType: fixedFile.type
                    });
                    if (!error) successCount++;
                    else lastError = error;
                    Swal.update({ html: `<div class="text-sm text-slate-500">${i + 1} / ${total} ไฟล์</div>` });
                }

                if (successCount === total) {
                    Swal.fire({ icon: 'success', title: `อัปโหลดสำเร็จ ${total} ไฟล์`, timer: 1500, showConfirmButton: false });
                } else {
                    // แสดง error จริงๆ พร้อมคำแนะนำ
                    const errMsg = lastError?.message || 'ไม่ทราบสาเหตุ';
                    const isNoPolicy = errMsg.includes('policy') || errMsg.includes('Unauthorized') || errMsg.includes('403') || errMsg.includes('row-level');
                    const isBucketNotFound = errMsg.includes('Bucket not found') || errMsg.includes('404') || errMsg.includes('does not exist');
                    let hint = '';
                    if (isBucketNotFound) {
                        hint = `<div class="mt-3 p-3 bg-amber-50 rounded-xl text-left text-xs text-amber-700 leading-relaxed">
                            <b>วิธีแก้:</b> ไปที่ Supabase Dashboard → Storage<br>
                            → กด <b>New Bucket</b> → ชื่อ <b>gallery</b> → เปิด Public ✓
                        </div>`;
                    } else if (isNoPolicy) {
                        hint = `<div class="mt-3 p-3 bg-amber-50 rounded-xl text-left text-xs text-amber-700 leading-relaxed">
                            <b>วิธีแก้:</b> ไปที่ Supabase → SQL Editor แล้วรัน:<br>
                            <code class="block mt-1 bg-white p-1.5 rounded text-slate-600 font-mono">CREATE POLICY "admin_upload_gallery"<br>
ON storage.objects FOR INSERT<br>
WITH CHECK (bucket_id = 'gallery'<br>
AND auth.role() = 'authenticated');</code>
                        </div>`;
                    } else {
                        hint = `<div class="mt-3 p-3 bg-slate-50 rounded-xl text-left text-xs text-slate-600">${errMsg}</div>`;
                    }
                    Swal.fire({
                        icon: 'error',
                        title: `อัปโหลดไม่สำเร็จ (${successCount}/${total})`,
                        html: hint,
                        confirmButtonColor: '#6366f1',
                        confirmButtonText: 'รับทราบ'
                    });
                }
            };
            input.click();
        };

        // ── Google Drive URL converter ──
        function _gdriveToDirectUrl(url) {
            if (!url) return url;
            // รูปแบบ 1: /file/d/ID/view หรือ /file/d/ID/edit
            const m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (m1) return `https://drive.google.com/uc?export=view&id=${m1[1]}`;
            // รูปแบบ 2: id=ID (query param)
            const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (m2) return `https://drive.google.com/uc?export=view&id=${m2[1]}`;
            // รูปแบบ 3: open?id=ID
            const m3 = url.match(/open\?id=([a-zA-Z0-9_-]+)/);
            if (m3) return `https://drive.google.com/uc?export=view&id=${m3[1]}`;
            return url; // ไม่ใช่ Drive URL → คืนค่าเดิม
        }

        // รูป label keywords ที่ควรมีปุ่มอัปโหลด
        const _IMG_KEYWORDS = ['รูป', 'image', 'logo', 'cover', 'popup', 'uniform', 'photo', 'img'];
        // link label keywords ที่ไม่ควรมีปุ่ม
        const _LINK_KEYWORDS = ['facebook', 'youtube', 'vtr', 'youtube', 'google maps', 'embed', 'link', 'ลิงก์', 'เพลง', 'file url', 'ไฟล์'];

        function _isImageField(label) {
            const l = label.toLowerCase();
            const hasImg = _IMG_KEYWORDS.some(k => l.includes(k));

        function _imgFieldHtml(inputHtml, inputId, currentUrl, extraCls = '') {

        // อัปโหลดรูปจริง → Supabase Storage bucket "images"
        // ── ตรวจ MIME type จริงแล้วแปลงนามสกุลให้ถูกต้อง ──
        // แก้ปัญหารูปจาก LINE / HEIC / ไม่มีนามสกุล
        const _MIME_TO_EXT = {
            'image/jpeg': 'jpg', 'image/jpg': 'jpg',
            'image/png': 'png', 'image/gif': 'gif',
            'image/webp': 'webp', 'image/heic': 'jpg',
            'image/heif': 'jpg', 'image/bmp': 'jpg',
            'image/tiff': 'jpg', 'image/avif': 'webp'
        };

        async function _getFixedFile(file) {
            // ดึง extension จาก MIME type จริง
            const mime = file.type || 'image/jpeg';
            const ext = _MIME_TO_EXT[mime] || 'jpg';

            // ถ้า HEIC → แปลงเป็น JPEG ก่อนอัปโหลด (ผ่าน canvas)
            if (mime === 'image/heic' || mime === 'image/heif') {
                try {
                    const bitmap = await createImageBitmap(file);
                    const canvas = document.createElement('canvas');
                    canvas.width = bitmap.width; canvas.height = bitmap.height;
                    canvas.getContext('2d').drawImage(bitmap, 0, 0);
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.92));
                    return new File([blob], `img_${Date.now()}.jpg`, { type: 'image/jpeg' });
                } catch (e) { /* fallback */ }
            }

            // สร้างชื่อไฟล์ใหม่ที่ clean เสมอ
            const safeName = `img_${Date.now()}_${Math.random().toString(36).slice(2, 6)}.${ext}`;
            return new File([file], safeName, { type: mime === 'image/heic' ? 'image/jpeg' : mime });
        }

                if (btn) { btn.classList.add('uploading'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xs"></i> กำลังอัปโหลด...'; }

                // แปลงไฟล์ให้มีนามสกุลถูกต้อง (รองรับรูปจาก LINE, HEIC ฯลฯ)
                const fixedFile = await _getFixedFile(file);
                const path = fixedFile.name;

                const { data, error } = await supabaseAdmin.storage.from('images').upload(path, fixedFile, {
                    upsert: true,
                    contentType: fixedFile.type
                });

                if (btn) { btn.classList.remove('uploading'); btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up text-xs"></i> อัปโหลด'; }

                    return;
                }

                // Get public URL
                const { data: { publicUrl } } = supabaseAdmin.storage.from('images').getPublicUrl(path);

                // Fill the input
                const inp = document.getElementById(inputId) || document.querySelector(`[name="${inputId.split('-').slice(1).join('-')}"]`);
                if (inp) { inp.value = publicUrl; inp.dispatchEvent(new Event('input')); }

                const prevImg = document.getElementById(`prev-${inputId}`);
                if (prevImg) { prevImg.src = publicUrl; prevImg.style.display = 'block'; }

                Swal.fire({ icon: 'success', title: 'อัปโหลดสำเร็จ!', text: 'URL ถูกใส่ในช่องอัตโนมัติแล้ว', timer: 1800, showConfirmButton: false });

        async function saveTeacher() {
            const id = document.getElementById('tm-id').value;
            const name = document.getElementById('tm-name').value.trim();
            const username = document.getElementById('tm-username').value.trim();
            const password = document.getElementById('tm-password').value;
            const position = document.getElementById('tm-position').value;
            const isActive = document.getElementById('tm-active').checked;

            if (!name || !username) { alert('กรุณากรอกชื่อและ username'); return; }
            if (!id && !password) { alert('กรุณาใส่รหัสผ่านสำหรับครูใหม่'); return; }

            const obj = { name, username, position, is_active: isActive };
            if (password) obj.password_hash = password; // store plain (or hash server-side)

            let error;
            if (id) {
                ({ error } = await pawDb.from('teachers').update(obj).eq('id', id));
            } else {
                ({ error } = await pawDb.from('teachers').insert(obj));
            }

            if (error) { alert('เกิดข้อผิดพลาด: ' + error.message); return; }
            closeTeacherModal();
            await fetchTeachers();
        }

            const id = document.getElementById('tm-id').value;
            if (!id) return;
            if (!confirm('ยืนยันลบครูคนนี้? ข้อมูลที่เชื่อมกันจะถูกลบด้วย')) return;
            const { error } = await pawDb.from('teachers').delete().eq('id', id);
            if (error) { alert('เกิดข้อผิดพลาด: ' + error.message); return; }
            closeTeacherModal();
            await fetchTeachers();
        }

        <div class="bg-white rounded-xl border border-slate-100 px-4 py-3 flex items-center gap-3 shadow-sm">
          <i class="fa-solid fa-venus text-pink-500 text-lg"></i>
          <div><p class="text-xs text-slate-500">หญิง</p><p id="stu-count-f" class="text-lg font-bold text-slate-800">0</p></div>
        </div>
        <div class="bg-white rounded-xl border border-slate-100 px-4 py-3 flex items-center gap-3 shadow-sm">
          <i class="fa-solid fa-mars text-sky-500 text-lg"></i>
          <div><p class="text-xs text-slate-500">ชาย</p><p id="stu-count-m" class="text-lg font-bold text-slate-800">0</p></div>
        </div>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div id="stu-loading" class="text-center py-12 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>เลือกห้องเรียนเพื่อโหลด</div>
        <table id="stu-table" class="hidden w-full text-sm">
          <thead>
            <tr class="bg-emerald-50 border-b border-emerald-100">
              <th class="px-4 py-3 text-left text-xs font-bold text-emerald-700 w-12">ที่</th>
              <th class="px-4 py-3 text-left text-xs font-bold text-emerald-700 w-24">รหัสนักเรียน</th>
              <th class="px-4 py-3 text-left text-xs font-bold text-emerald-700">ชื่อ-นามสกุล</th>
              <th class="px-4 py-3 text-center text-xs font-bold text-emerald-700 w-20">เพศ</th>
              <th class="px-4 py-3 text-center text-xs font-bold text-emerald-700 w-20">สถานะ</th>
              <th class="px-4 py-3 text-center text-xs font-bold text-emerald-700 w-24 no-print">จัดการ</th>
            </tr>
          </thead>
          <tbody id="stu-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Modal เพิ่ม/แก้ไขนักเรียน -->
    <div id="stu-modal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center backdrop-blur-sm p-4">
      <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
        <div class="flex justify-between items-center px-6 py-4 border-b bg-slate-50">
          <h3 id="stu-modal-title" class="font-bold text-slate-800 flex items-center gap-2">
            <i class="fa-solid fa-user-plus text-emerald-500"></i> เพิ่มนักเรียน
          </h3>
          <button onclick="document.getElementById('stu-modal').classList.add('hidden')" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-red-50 text-slate-400 hover:text-red-500 flex items-center justify-center transition">
            <i class="fa-solid fa-times text-sm"></i>
          </button>
        </div>
        <div class="px-6 py-5 overflow-y-auto max-h-[70vh]">
          <input type="hidden" id="sm2-id">

          <p class="text-xs font-bold text-emerald-700 mb-2 uppercase tracking-wide">ข้อมูลพื้นฐาน</p>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">รหัสนักเรียน *</label>
              <input id="sm2-no" type="text" placeholder="6501" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">เลขที่นั่ง</label>
              <input id="sm2-seat" type="number" min="1" placeholder="1" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
          </div>
          <div class="mb-3">
            <label class="block text-xs font-semibold text-slate-500 mb-1">ชื่อ-นามสกุล * (รวมคำนำหน้า)</label>
            <input id="sm2-name" type="text" placeholder="เด็กชายสมชาย ใจดี" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
          </div>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">เพศ</label>
              <select id="sm2-gender" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                <option value="ชาย">ชาย</option>
                <option value="หญิง">หญิง</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">วันเกิด</label>
              <input id="sm2-birth" type="date" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
          </div>
          <div class="mb-3">
            <label class="block text-xs font-semibold text-slate-500 mb-1">เลขบัตรประชาชน (13 หลัก)</label>
            <input id="sm2-natid" type="text" maxlength="13" placeholder="1234567890123" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
          </div>
          <div class="grid grid-cols-3 gap-3 mb-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">สัญชาติ</label>
              <input id="sm2-nationality" type="text" value="ไทย" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">เชื้อชาติ</label>
              <input id="sm2-ethnicity" type="text" value="ไทย" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">ศาสนา</label>
              <input id="sm2-religion" type="text" value="พุทธ" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
          </div>
          <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-500 mb-1">ที่อยู่</label>
            <textarea id="sm2-address" rows="2" placeholder="บ้านเลขที่ / หมู่ / ตำบล / อำเภอ / จังหวัด" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 resize-none"></textarea>
          </div>

          <p class="text-xs font-bold text-emerald-700 mb-2 uppercase tracking-wide">ข้อมูลผู้ปกครอง</p>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">ชื่อบิดา</label>
              <input id="sm2-father" type="text" placeholder="นายสมชาย ใจดี" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">ชื่อมารดา</label>
              <input id="sm2-mother" type="text" placeholder="นางสมศรี ใจดี" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">ชื่อผู้ปกครอง</label>
              <input id="sm2-parent" type="text" placeholder="กรณีไม่ใช่พ่อหรือแม่" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">ความสัมพันธ์</label>
              <select id="sm2-relation" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                <option value="บิดา">บิดา</option>
                <option value="มารดา">มารดา</option>
                <option value="ปู่/ย่า">ปู่/ย่า</option>
                <option value="ตา/ยาย">ตา/ยาย</option>
                <option value="ลุง/ป้า/น้า/อา">ลุง/ป้า/น้า/อา</option>
                <option value="อื่นๆ">อื่นๆ</option>
              </select>
            </div>
          </div>
          <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-500 mb-1">เบอร์โทรผู้ปกครอง</label>
            <input id="sm2-phone" type="text" placeholder="0812345678" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
          </div>

          <p class="text-xs font-bold text-emerald-700 mb-2 uppercase tracking-wide">ข้อมูลระบบ</p>
          <div class="mb-3">
            <label class="block text-xs font-semibold text-slate-500 mb-1">ห้องเรียน *</label>
            <select id="sm2-class" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
              <option value="">— เลือกห้อง —</option>
            </select>
          </div>
          <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl">
            <input type="checkbox" id="sm2-active" checked class="w-4 h-4 accent-emerald-600">
            <label for="sm2-active" class="text-sm text-slate-600">นักเรียนยังอยู่ในระบบ (is_active)</label>
          </div>
        </div>
        <div class="px-6 py-4 border-t flex justify-between">
          <button id="stu-delete-btn" onclick="deleteStudent()" class="hidden text-red-500 hover:text-red-700 text-sm font-semibold px-4 py-2 hover:bg-red-50 rounded-lg transition">
            <i class="fa-solid fa-trash mr-1"></i> ลบ
          </button>
          <div class="flex gap-2 ml-auto">
            <button onclick="document.getElementById('stu-modal').classList.add('hidden')" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg transition">ยกเลิก</button>
            <button onclick="saveStudent()" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-semibold shadow transition">
              <i class="fa-solid fa-floppy-disk mr-1"></i> บันทึก
            </button>
          </div>
        </div>
      </div>
    </div>`;

            // โหลดห้องเรียน dropdown
            const { data: cls } = await pawDb.from('classrooms').select('id,name,academic_year').order('grade').order('name');
            const clsSel = document.getElementById('stu-sel-class');
            const sm2Cls = document.getElementById('sm2-class');
            (cls || []).forEach(c => {
                const txt = `${c.name} (${c.academic_year})`;
                clsSel.innerHTML += `<option value="${c.id}">${txt}</option>`;
                sm2Cls.innerHTML += `<option value="${c.id}">${txt}</option>`;
            });
        }

        let stuAllData = [];

        async function fetchStudents() {
            const cid = document.getElementById('stu-sel-class')?.value;
            if (!cid) return;
            document.getElementById('stu-loading').textContent = 'กำลังโหลด...';
            document.getElementById('stu-loading').classList.remove('hidden');
            document.getElementById('stu-table').classList.add('hidden');
            document.getElementById('stu-stats').classList.add('hidden');

            const { data } = await pawDb.from('students').select('*').eq('classroom_id', cid).order('student_no');
            stuAllData = data || [];
            renderStudents(stuAllData);
        }

        function filterStudents() {
            const q = (document.getElementById('stu-search')?.value || '').toLowerCase();
            renderStudents(q ? stuAllData.filter(s => s.name?.toLowerCase().includes(q) || s.student_no?.toLowerCase().includes(q)) : stuAllData);
        }

        function renderStudents(data) {
            document.getElementById('stu-loading').classList.add('hidden');
            const tbl = document.getElementById('stu-table');
            const tbody = document.getElementById('stu-tbody');
            if (!data?.length) {
                tbl.classList.add('hidden');
                document.getElementById('stu-loading').textContent = 'ไม่พบนักเรียน';
                document.getElementById('stu-loading').classList.remove('hidden');
                return;
            }
            tbl.classList.remove('hidden');
            // stats
            document.getElementById('stu-stats').classList.remove('hidden');
            document.getElementById('stu-count-all').textContent = stuAllData.length;
            document.getElementById('stu-count-active').textContent = stuAllData.filter(s => s.is_active).length;
            document.getElementById('stu-count-f').textContent = stuAllData.filter(s => s.gender === 'หญิง').length;
            document.getElementById('stu-count-m').textContent = stuAllData.filter(s => s.gender === 'ชาย').length;

            tbody.innerHTML = data.map((s, i) => `
    <tr class="${i % 2 === 0 ? '' : 'bg-slate-50/50'} hover:bg-emerald-50/30 border-b border-slate-50 transition">
      <td class="px-4 py-2.5 text-slate-400 text-xs">${i + 1}</td>
      <td class="px-4 py-2.5 font-mono text-xs text-slate-500">${s.student_no || '-'}</td>
      <td class="px-4 py-2.5 font-medium text-slate-700">${s.name || '-'}</td>
      <td class="px-4 py-2.5 text-center">
        <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${s.gender === 'หญิง' ? 'bg-pink-100 text-pink-700' : 'bg-sky-100 text-sky-700'}">${s.gender || '-'}</span>
      </td>
      <td class="px-4 py-2.5 text-center">
        <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${s.is_active ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-600'}">${s.is_active ? 'ใช้งาน' : 'ออก'}</span>
      </td>
      <td class="px-4 py-2.5 text-center">
        <button onclick="openEditStudent(stuAllData.find(x=>x.id===${s.id}))"
          class="px-3 py-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-lg text-xs font-semibold transition">
          <i class="fa-solid fa-pen"></i>
        </button>
      </td>
    </tr>`).join('');
        }

        function openAddStudent() {
            ['sm2-id', 'sm2-no', 'sm2-name', 'sm2-seat', 'sm2-birth', 'sm2-natid', 'sm2-nationality', 'sm2-ethnicity', 'sm2-religion', 'sm2-address', 'sm2-father', 'sm2-mother', 'sm2-parent', 'sm2-phone'].forEach(id => {
                const el = document.getElementById(id); if (el) el.value = '';
            });
            const defMap = { 'sm2-nationality': 'ไทย', 'sm2-ethnicity': 'ไทย', 'sm2-religion': 'พุทธ', 'sm2-relation': 'บิดา' };
            Object.entries(defMap).forEach(([id, v]) => { const el = document.getElementById(id); if (el) el.value = v; });
            document.getElementById('sm2-gender').value = 'ชาย';
            document.getElementById('sm2-active').checked = true;
            const cid = document.getElementById('stu-sel-class')?.value;
            if (cid) document.getElementById('sm2-class').value = cid;
            document.getElementById('stu-delete-btn').classList.add('hidden');
            document.getElementById('stu-modal-title').innerHTML = '<i class="fa-solid fa-user-plus text-emerald-500"></i> เพิ่มนักเรียน';
            document.getElementById('stu-modal').classList.remove('hidden');
        }

        function openEditStudent(s) {
            document.getElementById('sm2-id').value = s.id || '';
            document.getElementById('sm2-no').value = s.student_no || '';
            document.getElementById('sm2-seat').value = s.seat_no || '';
            document.getElementById('sm2-name').value = s.name || '';
            document.getElementById('sm2-gender').value = s.gender || 'ชาย';
            document.getElementById('sm2-birth').value = s.birth_date || '';
            document.getElementById('sm2-natid').value = s.national_id || '';
            document.getElementById('sm2-nationality').value = s.nationality || 'ไทย';
            document.getElementById('sm2-ethnicity').value = s.ethnicity || 'ไทย';
            document.getElementById('sm2-religion').value = s.religion || 'พุทธ';
            document.getElementById('sm2-address').value = s.address || '';
            document.getElementById('sm2-father').value = s.father_name || '';
            document.getElementById('sm2-mother').value = s.mother_name || '';
            document.getElementById('sm2-parent').value = s.parent_name || '';
            document.getElementById('sm2-relation').value = s.parent_relation || 'บิดา';
            document.getElementById('sm2-phone').value = s.parent_phone || '';
            document.getElementById('sm2-class').value = s.classroom_id || '';
            document.getElementById('sm2-active').checked = s.is_active !== false;
            document.getElementById('stu-delete-btn').classList.remove('hidden');
            document.getElementById('stu-modal-title').innerHTML = '<i class="fa-solid fa-pen text-emerald-500"></i> แก้ไขนักเรียน';
            document.getElementById('stu-modal').classList.remove('hidden');
        }

        async function saveStudent() {
            const id = document.getElementById('sm2-id').value;
            const seatVal = document.getElementById('sm2-seat').value;
            const obj = {
                student_no: document.getElementById('sm2-no').value.trim(),
                name: document.getElementById('sm2-name').value.trim(),
                gender: document.getElementById('sm2-gender').value,
                classroom_id: parseInt(document.getElementById('sm2-class').value) || null,
                is_active: document.getElementById('sm2-active').checked,
                seat_no: seatVal ? parseInt(seatVal) : null,
                birth_date: document.getElementById('sm2-birth').value || null,
                national_id: document.getElementById('sm2-natid').value.trim() || null,
                nationality: document.getElementById('sm2-nationality').value.trim() || null,
                ethnicity: document.getElementById('sm2-ethnicity').value.trim() || null,
                religion: document.getElementById('sm2-religion').value.trim() || null,
                address: document.getElementById('sm2-address').value.trim() || null,
                father_name: document.getElementById('sm2-father').value.trim() || null,
                mother_name: document.getElementById('sm2-mother').value.trim() || null,
                parent_name: document.getElementById('sm2-parent').value.trim() || null,
                parent_relation: document.getElementById('sm2-relation').value || null,
                parent_phone: document.getElementById('sm2-phone').value.trim() || null,
            };
            if (!obj.student_no || !obj.name || !obj.classroom_id) { alert('กรุณากรอกข้อมูลให้ครบ'); return; }
            const { error } = id ? await pawDb.from('students').update(obj).eq('id', id)
                : await pawDb.from('students').insert(obj);
            if (error) { alert('เกิดข้อผิดพลาด: ' + error.message); return; }
            document.getElementById('stu-modal').classList.add('hidden');
            await fetchStudents();
        }

        async function deleteStudent() {
            const id = document.getElementById('sm2-id').value;
            if (!confirm('ลบนักเรียนคนนี้?')) return;
            const { error } = await pawDb.from('students').delete().eq('id', id);
            if (error) { alert('เกิดข้อผิดพลาด: ' + error.message); return; }
            document.getElementById('stu-modal').classList.add('hidden');
            await fetchStudents();
        }

    </script>
</body>

</html>
