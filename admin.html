<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏫</text></svg>">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'] } } }
        }
    </script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
        }

        /* Sidebar scrollbar */
        .sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
        }

        .sidebar-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Menu group animation */
        .menu-group-items {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
            opacity: 0;
        }

        .menu-group-items.open {
            max-height: 500px;
            opacity: 1;
        }

        /* Active menu item */
        .admin-menu-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.15));
            color: #a5b4fc;
            border-left: 3px solid #818cf8;
        }

        /* Menu group header */
        .menu-group-header {
            transition: all 0.2s ease;
        }

        .menu-group-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-group-header .chevron {
            transition: transform 0.3s ease;
        }

        .menu-group-header.expanded .chevron {
            transform: rotate(90deg);
        }

        /* Fade in animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Upload image button */
        .upload-img-btn {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 42px;
            border-radius: 12px;
            border: 1.5px dashed #cbd5e1;
            background: #f8fafc;
            color: #64748b;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .upload-img-btn:hover {
            border-color: #6366f1;
            background: #eef2ff;
            color: #6366f1;
        }
        .upload-img-btn.uploading {
            border-color: #6366f1;
            background: #eef2ff;
            color: #6366f1;
            pointer-events: none;
        }
        .img-preview-thumb {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            object-fit: cover;
            border: 1.5px solid #e2e8f0;
            flex-shrink: 0;
            display: none;
        }
        .img-field-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .img-field-wrap input {
            flex: 1;
            min-width: 0;
        }
        .gdrive-btn {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 0 11px;
            height: 42px;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            background: #fff;
            color: #64748b;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .gdrive-btn:hover {
            border-color: #4285f4;
            background: #f0f5ff;
            color: #4285f4;
        }
        .gdrive-converted {
            animation: gdrive-flash 0.5s ease;
        }
        @keyframes gdrive-flash {
            0%   { background: #d1fae5; }
            100% { background: transparent; }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Modal backdrop */
        @keyframes modalFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>

<body class="flex h-screen bg-slate-100/80 overflow-hidden font-sans">

    <!-- ============ SIDEBAR ============ -->

            <!-- Group 2: บุคลากร & นักเรียน -->

                    <div class="flex items-center gap-2">

                        <span>บุคลากร & นักเรียน</span>
                    </div>
                    <i class="fa-solid fa-chevron-right chevron text-[8px] opacity-50"></i>
                </button>
                <div class="menu-group-items open">
                    <button onclick="loadSection('personnel')"
                        class="admin-menu-item w-full text-left pl-9 pr-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-white/5 flex items-center gap-3 transition-all text-sm">

                    <button onclick="loadSection('personnel_history')"

                        <i class="fa-solid fa-clock-rotate-left w-4 text-center text-xs"></i> ทำเนียบบุคลากร

                    <button onclick="loadSection('student_data')"

                        <i class="fa-solid fa-chart-pie w-4 text-center text-xs"></i> ข้อมูลนักเรียน

                    <button onclick="loadSection('school_board')"

                        <i class="fa-solid fa-users-rectangle w-4 text-center text-xs"></i> คณะกรรมการสถานศึกษา
                    </button>
                    <button onclick="loadSection('student_council')"
                        class="admin-menu-item w-full text-left pl-9 pr-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-white/5 flex items-center gap-3 transition-all text-sm">
                        <i class="fa-solid fa-user-graduate w-4 text-center text-xs"></i> สภานักเรียน
                    </button>
                </div>
            </div>

            <!-- Group 3: ข่าวสาร & ผลงาน -->
            <div class="menu-group">
                <button onclick="toggleGroup(this)"
                    class="menu-group-header w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-slate-400 hover:text-slate-200 text-xs font-bold uppercase tracking-wider">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-newspaper text-amber-400 w-4 text-center"></i>
                        <span>ข่าวสาร & ผลงาน</span>
                    </div>
                    <i class="fa-solid fa-chevron-right chevron text-[8px] opacity-50"></i>
                </button>
                <div class="menu-group-items open">
                    <button onclick="loadSection('news')"
                        class="admin-menu-item w-full text-left pl-9 pr-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-white/5 flex items-center gap-3 transition-all text-sm">
                        <i class="fa-solid fa-newspaper w-4 text-center text-xs"></i> ข่าวสาร

                    <button onclick="loadSection('teacher_awards')"
                        class="admin-menu-item w-full text-left pl-9 pr-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-white/5 flex items-center gap-3 transition-all text-sm">
                        <i class="fa-solid fa-medal w-4 text-center text-xs"></i> ผลงานครู
                    </button>
                    <button onclick="loadSection('student_awards')"
                        class="admin-menu-item w-full text-left pl-9 pr-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-white/5 flex items-center gap-3 transition-all text-sm">
                        <i class="fa-solid fa-trophy w-4 text-center text-xs"></i> ผลงานนักเรียน
                    </button>
                    <button onclick="loadSection('school_awards')"
                        class="admin-menu-item w-full text-left pl-9 pr-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-white/5 flex items-center gap-3 transition-all text-sm">
                        <i class="fa-solid fa-award w-4 text-center text-xs"></i> ผลงานโรงเรียน
                    </button>
                </div>
            </div>

            <!-- Group 4: วิชาการ -->
            <div class="menu-group">
                <button onclick="toggleGroup(this)"

                </button>
                <div class="menu-group-items">
                    <button onclick="loadAcademicSection('onet')"

                        <i class="fa-solid fa-chart-line w-4 text-center text-xs text-emerald-400"></i> ผลสัมฤทธิ์ O-NET
                    </button>
                    <button onclick="loadAcademicSection('nt')"
                        class="admin-menu-item w-full text-left pl-9 pr-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-white/5 flex items-center gap-3 transition-all text-sm">
                        <i class="fa-solid fa-chart-simple w-4 text-center text-xs text-blue-400"></i> ผลสัมฤทธิ์ NT
                    </button>
                    <button onclick="loadAcademicSection('rt')"

            <div class="menu-group">
                <button onclick="toggleGroup(this)"
                    class="menu-group-header w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-slate-400 hover:text-slate-200 text-xs font-bold uppercase tracking-wider">

                    </div>

                </button>

        <!-- Logout -->

            <div class="h-px bg-gradient-to-r from-transparent via-slate-700 to-transparent mb-3"></div>
            <button onclick="logout()"
                class="w-full bg-white/5 hover:bg-red-500/20 text-slate-400 hover:text-red-400 py-2.5 rounded-xl font-semibold transition-all flex justify-center items-center gap-2 text-sm border border-white/5 hover:border-red-500/30">

            </button>

    <!-- ============ MAIN AREA ============ -->

        <!-- Top Header Bar -->

            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 text-sm text-slate-400">
                    <i class="fa-solid fa-house text-xs"></i>
                    <span>/</span>
                    <span id="breadcrumb-text" class="text-slate-700 font-semibold">Dashboard</span>

        <!-- Content Area -->

    <!-- ============ MODAL ============ -->
    <div id="modal"
        class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center backdrop-blur-md p-4"
        style="animation: modalFadeIn 0.2s ease">
        <div class="bg-white p-0 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-hidden shadow-2xl shadow-slate-900/20 border border-slate-200/50"

            <!-- Modal Header -->
            <div
                class="flex justify-between items-center px-6 py-4 bg-gradient-to-r from-slate-50 to-white border-b border-slate-100">
                <h2 id="modal-title" class="font-bold text-lg text-slate-800 flex items-center gap-2">

                    </div>
                    จัดการข้อมูล
                </h2>
                <button onclick="closeModal()"
                    class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-red-50 text-slate-400 hover:text-red-500 flex items-center justify-center transition-all">
                    <i class="fa-solid fa-times text-sm"></i>
                </button>
            </div>
            <!-- Modal Body -->
            <div class="px-6 py-5 overflow-y-auto max-h-[60vh]">
                <form id="data-form" class="space-y-4">
                    <input type="hidden" name="id" id="field-id">
                    <div id="form-fields"></div>
                </form>
            </div>
            <!-- Modal Footer -->
            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex gap-3">
                <button onclick="submitForm()"
                    class="bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white px-5 py-2.5 rounded-xl flex-1 font-bold shadow-lg shadow-indigo-500/20 transition-all hover:shadow-xl hover:shadow-indigo-500/30 text-sm">
                    <i class="fa-solid fa-check mr-1"></i> บันทึกข้อมูล
                </button>
                <button onclick="closeModal()"
                    class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 px-5 py-2.5 rounded-xl font-semibold transition-all text-sm">
                    ยกเลิก
                </button>
            </div>
        </div>

        window.openGalleryUpload = async function(albumId, folderPath) {
            const input = document.createElement('input');

            input.multiple = true;
            input.onchange = async () => {
                const files = Array.from(input.files);
                if (!files.length) return;
                let successCount = 0;
                let lastError = null;
                const total = files.length;
                Swal.fire({
                    title: 'กำลังอัปโหลด...',
                    html: `<div class="text-sm text-slate-500">0 / ${total} ไฟล์</div>`,
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    didOpen: () => Swal.showLoading()
                });
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const fixedFile = await _getFixedFile(file);
                    const filePath = `${folderPath}/${fixedFile.name}`;
                    const { error } = await supabaseAdmin.storage.from('gallery').upload(filePath, fixedFile, {
                        upsert: true,
                        contentType: fixedFile.type
                    });
                    if (!error) successCount++;
                    else lastError = error;
                    Swal.update({ html: `<div class="text-sm text-slate-500">${i+1} / ${total} ไฟล์</div>` });
                }

                if (successCount === total) {
                    Swal.fire({ icon: 'success', title: `อัปโหลดสำเร็จ ${total} ไฟล์`, timer: 1500, showConfirmButton: false });
                } else {

                    const errMsg = lastError?.message || 'ไม่ทราบสาเหตุ';
                    const isNoPolicy = errMsg.includes('policy') || errMsg.includes('Unauthorized') || errMsg.includes('403') || errMsg.includes('row-level');

                            <b>วิธีแก้:</b> ไปที่ Supabase → SQL Editor แล้วรัน:<br>
                            <code class="block mt-1 bg-white p-1.5 rounded text-slate-600 font-mono">CREATE POLICY "admin_upload_gallery"<br>
ON storage.objects FOR INSERT<br>
WITH CHECK (bucket_id = 'gallery'<br>
AND auth.role() = 'authenticated');</code>
                        </div>`;
                    } else {
                        hint = `<div class="mt-3 p-3 bg-slate-50 rounded-xl text-left text-xs text-slate-600">${errMsg}</div>`;
                    }
                    Swal.fire({
                        icon: 'error',
                        title: `อัปโหลดไม่สำเร็จ (${successCount}/${total})`,
                        html: hint,
                        confirmButtonColor: '#6366f1',
                        confirmButtonText: 'รับทราบ'

                }
            };

        };

        // ── Google Drive URL converter ──
        function _gdriveToDirectUrl(url) {
            if (!url) return url;
            // รูปแบบ 1: /file/d/ID/view หรือ /file/d/ID/edit
            const m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (m1) return `https://drive.google.com/uc?export=view&id=${m1[1]}`;
            // รูปแบบ 2: id=ID (query param)
            const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (m2) return `https://drive.google.com/uc?export=view&id=${m2[1]}`;
            // รูปแบบ 3: open?id=ID
            const m3 = url.match(/open\?id=([a-zA-Z0-9_-]+)/);
            if (m3) return `https://drive.google.com/uc?export=view&id=${m3[1]}`;
            return url; // ไม่ใช่ Drive URL → คืนค่าเดิม
        }

        function _isGdriveUrl(url) {
            return url && url.includes('drive.google.com');
        }

                title: '<span style="font-size:16px;font-weight:600">วาง Link Google Drive</span>',
                html: `<div style="text-align:left;font-size:13px;color:#64748b;line-height:1.7">
                    <b style="color:#334155">ขั้นตอน:</b><br>
                    1. เปิด Google Drive → คลิกขวารูป → แชร์<br>
                    2. เปลี่ยนเป็น "ทุกคนที่มีลิงก์"<br>
                    3. คัดลอก Link แล้ววางด้านล่าง
                </div>
                <input type="text" id="gdrive-input" placeholder="https://drive.google.com/file/d/..."
                    style="width:100%;margin-top:12px;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;outline:none;box-sizing:border-box"
                    onfocus="this.style.borderColor='#6366f1'"
                    onblur="this.style.borderColor='#e2e8f0'">`,
                showCancelButton: true,
                confirmButtonText: 'แปลง URL',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#6366f1',
                preConfirm: () => {
                    const raw = document.getElementById('gdrive-input').value.trim();
                    if (!raw) { Swal.showValidationMessage('กรุณาวาง Link'); return false; }
                    const converted = _gdriveToDirectUrl(raw);
                    if (converted === raw && !raw.includes('uc?export=view')) {
                        Swal.showValidationMessage('ไม่พบ Google Drive URL — ลองคัดลอก link ใหม่');
                        return false;
                    }
                    return converted;
                }
            }).then(result => {
                if (!result.isConfirmed) return;
                const url = result.value;
                // ใส่ URL ในช่อง input
                const inp = document.getElementById(inputId)
                    || document.querySelector(`[name="${inputId.split('-').slice(1).join('-')}"]`);
                if (inp) {
                    inp.value = url;
                    inp.classList.add('gdrive-converted');
                    setTimeout(() => inp.classList.remove('gdrive-converted'), 600);
                    inp.dispatchEvent(new Event('input'));
                }
                // อัปเดต preview
                const prevImg = document.getElementById(`prev-${inputId}`);
                if (prevImg) { prevImg.src = url; prevImg.style.display = 'block'; }
            });
        };

                // รูป label keywords ที่ควรมีปุ่มอัปโหลด
        const _IMG_KEYWORDS = ['รูป','image','logo','cover','popup','uniform','photo','img'];
        // link label keywords ที่ไม่ควรมีปุ่ม
        const _LINK_KEYWORDS = ['facebook','youtube','vtr','youtube','google maps','embed','link','ลิงก์','เพลง','file url','ไฟล์'];

        function _isImageField(label) {
            const l = label.toLowerCase();
            const hasImg  = _IMG_KEYWORDS.some(k => l.includes(k));
            const hasLink = _LINK_KEYWORDS.some(k => l.includes(k));
            return hasImg && !hasLink;
        }

        // สร้าง HTML wrapper สำหรับ url input + ปุ่ม + thumbnail
        function _imgFieldHtml(inputHtml, inputId, currentUrl, extraCls = '') {
            const thumb = currentUrl
                ? `<img src="${currentUrl}" id="prev-${inputId}" class="img-preview-thumb" style="display:block" onerror="this.style.display='none'">`
                : `<img id="prev-${inputId}" class="img-preview-thumb">`;
            return `<div class="img-field-wrap ${extraCls}">
                ${inputHtml}
                <button type="button" class="gdrive-btn" title="วาง Link จาก Google Drive"
                    onclick="pasteGDrive('${inputId}')">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
                        <path d="M12 2L2 19h20L12 2z" fill="#4285F4" opacity=".2"/>
                        <path d="M2 19l6.5-11.25L12 13l-3.5 6H2z" fill="#0F9D58"/>
                        <path d="M22 19l-6.5-11.25L12 13l3.5 6H22z" fill="#FBBC05"/>
                        <path d="M8.5 7.75L12 2l3.5 5.75H8.5z" fill="#4285F4"/>
                        <path d="M8.5 13H15.5L12 19L8.5 13z" fill="#EA4335" opacity=".8"/>
                    </svg>
                    Drive
                </button>
                <button type="button" class="upload-img-btn" id="upbtn-${inputId}"
                    onclick="uploadImg('${inputId}')">
                    <i class="fa-solid fa-arrow-up-from-bracket text-xs"></i> อัปโหลด
                </button>
                ${thumb}
            </div>`;
        }

        // อัปโหลดรูปจริง → Supabase Storage bucket "images"
        // ── ตรวจ MIME type จริงแล้วแปลงนามสกุลให้ถูกต้อง ──
        // แก้ปัญหารูปจาก LINE / HEIC / ไม่มีนามสกุล
        const _MIME_TO_EXT = {
            'image/jpeg': 'jpg', 'image/jpg': 'jpg',
            'image/png': 'png', 'image/gif': 'gif',
            'image/webp': 'webp', 'image/heic': 'jpg',
            'image/heif': 'jpg', 'image/bmp': 'jpg',
            'image/tiff': 'jpg', 'image/avif': 'webp'
        };

        async function _getFixedFile(file) {
            // ดึง extension จาก MIME type จริง
            const mime = file.type || 'image/jpeg';
            const ext  = _MIME_TO_EXT[mime] || 'jpg';

            // ถ้า HEIC → แปลงเป็น JPEG ก่อนอัปโหลด (ผ่าน canvas)
            if (mime === 'image/heic' || mime === 'image/heif') {
                try {
                    const bitmap = await createImageBitmap(file);
                    const canvas = document.createElement('canvas');
                    canvas.width = bitmap.width; canvas.height = bitmap.height;
                    canvas.getContext('2d').drawImage(bitmap, 0, 0);
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.92));
                    return new File([blob], `img_${Date.now()}.jpg`, { type: 'image/jpeg' });
                } catch(e) { /* fallback */ }
            }

            // สร้างชื่อไฟล์ใหม่ที่ clean เสมอ
            const safeName = `img_${Date.now()}_${Math.random().toString(36).slice(2,6)}.${ext}`;
            return new File([file], safeName, { type: mime === 'image/heic' ? 'image/jpeg' : mime });
        }

                window.uploadImg = async function(inputId) {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.onchange = async () => {
                const file = fileInput.files[0];
                if (!file) return;

                const btn = document.getElementById(`upbtn-${inputId}`);
                if (btn) { btn.classList.add('uploading'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xs"></i> กำลังอัปโหลด...'; }

                // แปลงไฟล์ให้มีนามสกุลถูกต้อง (รองรับรูปจาก LINE, HEIC ฯลฯ)
                const fixedFile = await _getFixedFile(file);
                const path = fixedFile.name;

                const { data, error } = await supabaseAdmin.storage.from('images').upload(path, fixedFile, {
                    upsert: true,
                    contentType: fixedFile.type
                });

                if (btn) { btn.classList.remove('uploading'); btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up text-xs"></i> อัปโหลด'; }

                if (error) {
                    Swal.fire({ icon: 'error', title: 'อัปโหลดไม่สำเร็จ', html: `<div class="text-sm">${error.message}</div><div class="text-xs text-slate-400 mt-2">ตรวจสอบว่าสร้าง Storage Bucket ชื่อ <b>"images"</b> แล้วเปิด Public</div>`, confirmButtonColor: '#6366f1' });
                    return;
                }

                // Get public URL
                const { data: { publicUrl } } = supabaseAdmin.storage.from('images').getPublicUrl(path);

                // Fill the input
                const inp = document.getElementById(inputId) || document.querySelector(`[name="${inputId.split('-').slice(1).join('-')}"]`);
                if (inp) { inp.value = publicUrl; inp.dispatchEvent(new Event('input')); }

                // Show/update preview thumbnail
                const prevImg = document.getElementById(`prev-${inputId}`);
                if (prevImg) { prevImg.src = publicUrl; prevImg.style.display = 'block'; }

                Swal.fire({ icon: 'success', title: 'อัปโหลดสำเร็จ!', text: 'URL ถูกใส่ในช่องอัตโนมัติแล้ว', timer: 1800, showConfirmButton: false });
            };
            fileInput.click();
        };

        // auto-preview + auto-convert Google Drive URL เมื่อวาง/พิมพ์
        document.addEventListener('input', e => {
            if (!e.target.id && !e.target.name) return;
            const inputEl = e.target;
            let url = inputEl.value.trim();

            // Auto-convert Google Drive URL
            if (_isGdriveUrl(url) && !url.includes('uc?export=view')) {
                const converted = _gdriveToDirectUrl(url);
                if (converted !== url) {
                    inputEl.value = converted;
                    inputEl.classList.add('gdrive-converted');
                    setTimeout(() => inputEl.classList.remove('gdrive-converted'), 600);
                    url = converted;
                }
            }

            // Update preview thumbnail
            const inputId = inputEl.id || `field-${inputEl.name}`;
            const prevImg = document.getElementById(`prev-${inputId}`);
            if (!prevImg) return;
            if (url) { prevImg.src = url; prevImg.style.display = 'block'; }
            else { prevImg.style.display = 'none'; }
        });

        // Also auto-convert on paste event (before input fires)
        document.addEventListener('paste', e => {
            const inputEl = e.target;
            if (inputEl.tagName !== 'INPUT' && inputEl.tagName !== 'TEXTAREA') return;
            setTimeout(() => {
                const url = inputEl.value.trim();
                if (_isGdriveUrl(url) && !url.includes('uc?export=view')) {
                    const converted = _gdriveToDirectUrl(url);
                    if (converted !== url) {
                        inputEl.value = converted;
                        inputEl.classList.add('gdrive-converted');
                        setTimeout(() => inputEl.classList.remove('gdrive-converted'), 600);
                        // Trigger preview update
                        inputEl.dispatchEvent(new Event('input', { bubbles: true }));
                    }
                }
            }, 10);
        });

                // Post-render enhancement hook (called after renderList finishes)
        function postRenderEnhance() {
            if (currentSection === 'gallery_albums' && currentData && currentData.length > 0) {
                const rows = document.querySelectorAll('#main-area .divide-y > div');
                rows.forEach((row, idx) => {
                    if (!currentData[idx]) return;
                    const album = currentData[idx];
                    const btnGroup = row.querySelector('.flex.gap-2');
                    if (btnGroup && album.album_url) {
                        const viewBtn = document.createElement('button');
                        viewBtn.onclick = (e) => { e.stopPropagation(); window.open(album.album_url, '_blank'); };
                        viewBtn.className = 'w-9 h-9 rounded-xl bg-blue-50 text-blue-500 hover:bg-blue-100 flex items-center justify-center transition-all text-xs';
                        viewBtn.innerHTML = '<i class="fa-solid fa-arrow-up-right-from-square"></i>';
                        viewBtn.title = 'เปิดอัลบั้ม';
                        btnGroup.insertBefore(viewBtn, btnGroup.firstChild);
                    }
                });
            }
            if (currentSection === 'calendar_events' && currentData && currentData.length > 0) {
                const typeLabel = { academic:'วิชาการ', activity:'กิจกรรม', holiday:'วันหยุด', exam:'สอบ', other:'อื่นๆ' };
                const typeBg = { academic:'bg-blue-100 text-blue-700', activity:'bg-emerald-100 text-emerald-700', holiday:'bg-red-100 text-red-700', exam:'bg-amber-100 text-amber-700', other:'bg-slate-100 text-slate-600' };
                document.querySelectorAll('#main-area .divide-y > div').forEach((row, idx) => {
                    if (!currentData[idx]) return;
                    const ev = currentData[idx];
                    const nameEl = row.querySelector('.font-semibold');
                    if (nameEl && ev.type) {
                        const badge = document.createElement('span');
                        badge.className = `text-[10px] font-bold px-2 py-0.5 rounded-lg ml-2 ${typeBg[ev.type] || typeBg.other}`;
                        badge.textContent = typeLabel[ev.type] || ev.type;
                        nameEl.appendChild(badge);
                    }
                    // Also show date
                    const subEl = row.querySelector('.text-xs.text-slate-400');
                    if (subEl && ev.start_date) {
                        subEl.textContent = ev.start_date;
                    }
                });
            }
        }
    </script>
</body>
