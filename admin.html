<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'] } } } }</script>
    <style>
        * {
            font-family: 'Sarabun', sans-serif
        }

        .side-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            border: none;
            background: none;
            cursor: pointer;
            transition: all .15s;
            text-align: left
        }

        .side-btn:hover {
            background: rgba(255, 255, 255, .08);
            color: #e2e8f0
        }

        .side-btn.active {
            background: #2563eb;
            color: #fff;
            font-weight: 700
        }

        .side-btn i {
            width: 18px;
            text-align: center;
            font-size: 13px
        }

        .group-label {
            font-size: 10px;
            font-weight: 800;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: .15em;
            padding: 20px 16px 6px
        }

        .field-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px
        }

        .field-row label {
            font-size: 13px;
            font-weight: 700;
            color: #374151
        }

        .field-row input,
        .field-row textarea,
        .field-row select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            font-size: 14px;
            outline: none;
            transition: border .15s;
            background: #fff;
            font-family: 'Sarabun', sans-serif
        }

        .field-row input:focus,
        .field-row textarea:focus,
        .field-row select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .1)
        }

        .field-row textarea {
            resize: vertical;
            min-height: 80px
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s;
            font-family: 'Sarabun', sans-serif
        }

        .btn-primary:hover {
            background: #1d4ed8
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer
        }

        .btn-danger:hover {
            background: #dc2626
        }

        .btn-edit {
            background: #f1f5f9;
            color: #2563eb;
            border: 1px solid #e2e8f0;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer
        }

        .btn-edit:hover {
            background: #dbeafe
        }

        .data-table {
            width: 100%;
            border-collapse: collapse
        }

        .data-table th {
            background: #f8fafc;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: .05em;
            border-bottom: 2px solid #e2e8f0
        }

        .data-table td {
            padding: 12px 16px;
            font-size: 14px;
            color: #334155;
            border-bottom: 1px solid #f1f5f9
        }

        .data-table tr:hover td {
            background: #f8fafc
        }

        .stat-box {
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 24px;
            text-align: center
        }

        .stat-box .num {
            font-size: 32px;
            font-weight: 800;
            color: #1e293b
        }

        .stat-box .lbl {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
            font-weight: 600
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fade-in {
            animation: fadeIn .3s ease forwards
        }
    </style>
</head>

        }

        function setNav(id) {
            document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
            const el = id ? document.getElementById(id) : null;
            if (el) el.classList.add('active');
            else if (event?.currentTarget) event.currentTarget.classList.add('active');
        }

        // Load Section
        async function loadSection(sec) {
            curSec = sec; const s = S[sec];
            setNav(null);
            document.getElementById('page-title').textContent = s.t;
            const m = document.getElementById('main-area');
            m.innerHTML = '<div class="flex items-center justify-center h-32"><i class="fa-solid fa-spinner fa-spin text-2xl text-blue-500"></i></div>';

            if (s.single) {
                const { data } = await sb.from(sec).select('*').limit(1).single();
                renderSingleForm(data || {});
            } else {
                const { data } = await sb.from(sec).select('*').order('id', { ascending: false });
                curData = data || [];
                renderList(s);
            }
        }

        // Form สำหรับ school_info (single record)
        function renderSingleForm(data) {
            const fields = S.school_info.fields;
            let h = '<div class="fade-in">';
            h += '<div class="bg-white border border-gray-200">';
            h += '<div class="bg-blue-600 text-white px-6 py-4"><h2 class="font-bold text-lg"><i class="fa-solid fa-gear mr-2"></i>ตั้งค่าข้อมูลโรงเรียน</h2><p class="text-blue-200 text-sm">กรอกข้อมูลให้ครบทุกช่อง แล้วกดบันทึก</p></div>';
            h += '<div class="p-6">';
            h += `<input type="hidden" id="si-id" value="${data.id || ''}">`;
            fields.forEach(f => {
                if (f.type === 'header') { h += `<div class="mt-6 mb-3 first:mt-0 pb-2 border-b-2 border-blue-600"><span class="text-sm font-bold text-blue-700"><i class="fa-solid fa-circle-dot text-[8px] mr-1"></i>${f.label}</span></div>`; return; }
                let val = data[f.key] || '';
                if (f.key === 'show_popup') val = data[f.key] === true ? "เปิดใช้งาน" : "ปิดการใช้งาน";
                let inp;
                if (f.type === 'textarea') inp = `<textarea id="si-${f.key}" class="field-row" style="padding:10px 14px;border:1px solid #e5e7eb;font-size:14px;outline:none;width:100%;min-height:80px;resize:vertical;font-family:'Sarabun',sans-serif">${val}</textarea>`;
                else if (f.type === 'color') inp = `<div style="display:flex;align-items:center;gap:8px"><input type="color" id="si-${f.key}" value="${val || '#000000'}" style="height:40px;width:60px;border:1px solid #e5e7eb;cursor:pointer"><span style="font-size:12px;color:#94a3b8">${val || '#000000'}</span></div>`;
                else if (f.type === 'select') inp = `<select id="si-${f.key}" style="padding:10px 14px;border:1px solid #e5e7eb;font-size:14px;outline:none;width:100%">${f.options.map(o => `<option ${val === o ? 'selected' : ''}>${o}</option>`).join('')}</select>`;
                else inp = `<input type="${f.type}" id="si-${f.key}" value="${val}" style="padding:10px 14px;border:1px solid #e5e7eb;font-size:14px;outline:none;width:100%">`;
                let preview = '';
                if (['logo_url', 'uniform_url', 'popup_img'].includes(f.key) && val) preview = `<img src="${val}" style="height:60px;margin-top:8px;border:1px solid #e5e7eb;object-fit:contain;background:#f8fafc" onerror="this.style.display='none'">`;
                h += `<div class="field-row"><label>${f.label}</label>${inp}${preview}</div>`;
            });
            h += `<button type="button" onclick="saveSchoolInfo()" class="btn-primary w-full mt-4" style="width:100%;padding:14px"><i class="fa-solid fa-floppy-disk mr-1"></i> บันทึกข้อมูลโรงเรียน</button>`;
            h += '</div></div></div>';
            document.getElementById('main-area').innerHTML = h;
        }

        async function saveSchoolInfo() {
            const data = {}, id = document.getElementById('si-id').value;
            S.school_info.fields.forEach(f => { if (!f.key) return; let v = document.getElementById(`si-${f.key}`).value; if (f.key === 'show_popup') data[f.key] = v === "เปิดใช้งาน"; else data[f.key] = v; });
            const { error } = id ? await sb.from('school_info').update(data).eq('id', id) : await sb.from('school_info').insert([data]);
            if (error) Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: error.message });
            else Swal.fire({ icon: 'success', title: 'บันทึกแล้ว!', timer: 1500, showConfirmButton: false });
        }

        // List view
        function renderList(s) {
            const m = document.getElementById('main-area');
            const fields = s.fields.filter(f => f.type !== 'header');
            const pk = fields[0]?.key;
            let h = `<div class="fade-in">
    <div class="flex items-center justify-between mb-4 gap-4">
      <div class="relative flex-1 max-w-sm"><i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i><input type="text" id="admin-search" oninput="filterList()" placeholder="ค้นหา..." style="width:100%;padding:10px 10px 10px 36px;border:1px solid #e2e8f0;font-size:14px;outline:none"></div>
      <button onclick="openModal()" class="btn-primary"><i class="fa-solid fa-plus mr-1"></i> เพิ่มข้อมูล</button>
    </div>
    <div class="bg-white border border-gray-200 overflow-hidden">`;
            if (!curData || !curData.length) {
                h += '<div class="p-12 text-center text-gray-400"><i class="fa-solid fa-inbox text-3xl mb-3 block"></i>ยังไม่มีข้อมูล</div>';
            } else {
                h += '<div class="overflow-x-auto"><table class="data-table"><thead><tr><th style="width:50px">#</th>';
                fields.slice(0, 3).forEach(f => h += `<th>${f.label}</th>`);
                h += '<th style="width:160px;text-align:right">จัดการ</th></tr></thead><tbody>';
                curData.forEach((item, i) => {
                    h += `<tr class="list-row" data-search="${Object.values(item).join(' ').toLowerCase()}">
        <td class="text-gray-400">${i + 1}</td>`;
                    fields.slice(0, 3).forEach(f => {
                        let v = item[f.key] || '-';
                        if ((f.key === 'image' || f.key === 'coverImageUrl') && item[f.key]) v = `<img src="${item[f.key]}" style="height:32px;width:32px;object-fit:cover;border:1px solid #e5e7eb" onerror="this.style.display='none'">`;
                        h += `<td>${v}</td>`;
                    });
                    h += `<td style="text-align:right;white-space:nowrap"><button onclick="editItem('${item.id}')" class="btn-edit" style="margin-right:4px"><i class="fa-solid fa-pen text-[10px]"></i> แก้ไข</button><button onclick="deleteItem('${item.id}')" class="btn-danger"><i class="fa-solid fa-trash text-[10px]"></i> ลบ</button></td></tr>`;
                });
                h += '</tbody></table></div>';
            }
            h += '</div></div>';
            m.innerHTML = h;
        }

        function filterList() {
            const q = document.getElementById('admin-search').value.toLowerCase().trim();
            document.querySelectorAll('.list-row').forEach(r => { r.style.display = (r.dataset.search || '').includes(q) ? '' : 'none' });
        }

        // Modal
        function openModal(isEdit = false, id = null) {
            const s = S[curSec];
            document.getElementById('modal-title').textContent = isEdit ? 'แก้ไขข้อมูล' : 'เพิ่มข้อมูลใหม่';
            document.getElementById('field-id').value = id || '';
            const item = isEdit && id ? curData.find(d => d.id == id) || {} : {};
            document.getElementById('form-fields').innerHTML = s.fields.filter(f => f.type !== 'header').map(f => {
                let v = item[f.key] || '';
                let inp;
                if (f.type === 'textarea') inp = `<textarea name="${f.key}" style="width:100%;padding:10px 14px;border:1px solid #e5e7eb;font-size:14px;outline:none;min-height:80px;resize:vertical;font-family:'Sarabun'" ${f.req ? 'required' : ''}>${v}</textarea>`;
                else if (f.type === 'select') inp = `<select name="${f.key}" style="width:100%;padding:10px 14px;border:1px solid #e5e7eb;font-size:14px;outline:none">${f.options.map(o => `<option ${v === o ? 'selected' : ''}>${o}</option>`).join('')}</select>`;
                else inp = `<input type="${f.type}" name="${f.key}" value="${v}" style="width:100%;padding:10px 14px;border:1px solid #e5e7eb;font-size:14px;outline:none;font-family:'Sarabun'" ${f.req ? 'required' : ''}>`;
                return `<div class="field-row"><label>${f.label}</label>${inp}</div>`;
            }).join('');
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden') }
        window.editItem = id => openModal(true, id);

        async function submitForm() {
            const form = document.getElementById('data-form');
            if (!form.checkValidity()) { form.reportValidity(); return }
            const d = Object.fromEntries(new FormData(form).entries()); const id = d.id; delete d.id;
            Object.keys(d).forEach(k => { if (d[k] === '') d[k] = null });
            const { error } = id ? await sb.from(curSec).update(d).eq('id', id) : await sb.from(curSec).insert([d]);
            if (error) Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: error.message });
            else { closeModal(); loadSection(curSec); Swal.fire({ icon: 'success', title: 'บันทึกแล้ว!', timer: 1200, showConfirmButton: false }) }
        }

        async function deleteItem(id) {
            const r = await Swal.fire({ title: 'ยืนยันลบ?', text: 'จะลบข้อมูลนี้ออกจากระบบ', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ลบ', cancelButtonText: 'ยกเลิก' });
            if (r.isConfirmed) { await sb.from(curSec).delete().eq('id', id); loadSection(curSec); Swal.fire({ icon: 'success', title: 'ลบแล้ว!', timer: 1200, showConfirmButton: false }) }
        }

        showDashboard();
    </script>
</body>

</html>
