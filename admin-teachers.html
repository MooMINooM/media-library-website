<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — จัดการครูผู้สอน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ["Sarabun", "sans-serif"] } } } }</script>
  <style>
    body {
      font-family: "Sarabun", sans-serif;
    }

    .overlay {
      background: rgba(0, 0, 0, .45);
    }
  </style>
</head>

<body class="bg-slate-100 text-slate-800">

  <!-- LOGIN -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
      <div class="text-center mb-6">
        <div class="w-14 h-14 rounded-2xl bg-violet-600 flex items-center justify-center mx-auto mb-3">
          <i class="fa-solid fa-user-shield text-white text-2xl"></i>
        </div>
        <h1 class="text-xl font-bold">Admin — จัดการครูผู้สอน</h1>
      </div>
      <div class="space-y-3">
        <input id="admin-pass" type="password" placeholder="รหัสผ่าน Admin"
          class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-violet-400 outline-none"
          onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()"
          class="w-full bg-violet-600 hover:bg-violet-700 text-white py-3 rounded-xl font-semibold text-sm transition">
          เข้าสู่ระบบ
        </button>
        <div class="flex gap-2 pt-1">
          <a href="index.html" class="flex-1 text-center text-xs text-slate-400 hover:text-slate-600 py-1">←
            เว็บโรงเรียน</a>
          <a href="admin.html" class="flex-1 text-center text-xs text-slate-400 hover:text-slate-600 py-1">Admin หลัก
            →</a>
        </div>
      </div>
    </div>
  </div>

  <!-- SHELL -->
  <div id="shell" class="hidden min-h-screen flex flex-col">
    <div class="bg-violet-700 text-white px-6 py-3 flex items-center justify-between shadow sticky top-0 z-30">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-chalkboard-user"></i>
        <span class="font-bold">จัดการครูผู้สอน</span>
      </div>
      <div class="flex items-center gap-3 text-sm">
        <a href="admin.html" class="text-violet-200 hover:text-white transition">Admin หลัก</a>
        <a href="paw.html" class="text-violet-200 hover:text-white transition">ปพ. ระบบ</a>
        <button onclick="doLogout()"
          class="bg-violet-800 hover:bg-violet-900 px-3 py-1.5 rounded-lg transition text-xs">
          <i class="fa-solid fa-right-from-bracket mr-1"></i>ออก
        </button>
      </div>
    </div>

    <div class="flex-1 p-6 max-w-6xl mx-auto w-full space-y-5">
      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-violet-100 flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-users text-violet-600"></i>
          </div>
          <div>
            <p class="text-2xl font-bold" id="stat-total">—</p>
            <p class="text-xs text-slate-400">ครูทั้งหมด</p>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-circle-check text-emerald-600"></i>
          </div>
          <div>
            <p class="text-2xl font-bold" id="stat-active">—</p>
            <p class="text-xs text-slate-400">เปิดใช้งาน</p>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-red-100 flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-circle-xmark text-red-500"></i>
          </div>
          <div>
            <p class="text-2xl font-bold" id="stat-inactive">—</p>
            <p class="text-xs text-slate-400">ปิดใช้งาน</p>
          </div>
        </div>
      </div>

      <!-- Teacher table -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100">
        <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between flex-wrap gap-3">
          <h2 class="font-bold flex items-center gap-2">
            <i class="fa-solid fa-list text-violet-500"></i> รายชื่อครูผู้สอน
          </h2>
          <div class="flex items-center gap-2">
            <input id="q" type="text" placeholder="ค้นหาชื่อ / username..."
              class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-violet-300 w-48"
              oninput="filterTeachers()">
            <button onclick="openTeacherModal()"
              class="flex items-center gap-1.5 bg-violet-600 hover:bg-violet-700 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow transition">
              <i class="fa-solid fa-plus"></i> เพิ่มครู
            </button>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-slate-50 border-b border-slate-100 text-xs text-slate-500 uppercase tracking-wide">
                <th class="px-4 py-3 text-left">ชื่อ-นามสกุล</th>
                <th class="px-4 py-3 text-left">Username</th>
                <th class="px-4 py-3 text-left">ตำแหน่ง</th>
                <th class="px-4 py-3 text-center">วิชาที่สอน</th>
                <th class="px-4 py-3 text-center">สถานะ</th>
                <th class="px-4 py-3 text-center">จัดการ</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr>
                <td colspan="6" class="text-center py-12 text-slate-400">
                  <i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังโหลด...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: เพิ่ม/แก้ไขครู -->
  <div id="m-teacher" class="hidden fixed inset-0 overlay z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md">
      <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
        <h3 id="m-teacher-title" class="font-bold">เพิ่มครูใหม่</h3>
        <button onclick="closeTeacherModal()"
          class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <input type="hidden" id="m-id">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">ชื่อ-นามสกุล <span
              class="text-red-500">*</span></label>
          <input id="m-name" type="text" placeholder="เช่น นายสมชาย ใจดี"
            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-violet-400 outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">ตำแหน่ง</label>
          <select id="m-position"
            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-violet-400 outline-none">
            <option>ครู</option>
            <option>ครูชำนาญการ</option>
            <option>ครูชำนาญการพิเศษ</option>
            <option>ครูเชี่ยวชาญ</option>
            <option>ผู้อำนวยการ</option>
            <option>รองผู้อำนวยการ</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Username <span
              class="text-red-500">*</span></label>
          <input id="m-username" type="text" placeholder="เช่น teacher01"
            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-violet-400 outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">
            รหัสผ่าน
            <span id="m-pass-req" class="text-red-500">*</span>
            <span id="m-pass-opt" class="hidden text-slate-400">(ว่างไว้ = ไม่เปลี่ยน)</span>
          </label>
          <div class="relative">
            <input id="m-password" type="password" placeholder="รหัสผ่าน"
              class="w-full border border-slate-200 rounded-lg px-3 py-2 pr-10 text-sm focus:ring-2 focus:ring-violet-400 outline-none">
            <button type="button" onclick="togglePw()"
              class="absolute right-3 top-2 text-slate-400 hover:text-slate-600">
              <i class="fa-solid fa-eye text-sm" id="pw-eye"></i>
            </button>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="m-active" class="w-4 h-4 accent-violet-600" checked>
          <label for="m-active" class="text-sm text-slate-600">เปิดใช้งานบัญชีนี้</label>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-2">
        <button onclick="closeTeacherModal()"
          class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg transition">ยกเลิก</button>
        <button id="m-save" onclick="saveTeacher()"
          class="px-5 py-2 bg-violet-600 hover:bg-violet-700 text-white rounded-lg text-sm font-semibold shadow transition">บันทึก</button>
      </div>
    </div>
  </div>

  <!-- MODAL: วิชาที่สอน -->
  <div id="m-subject" class="hidden fixed inset-0 overlay z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg">
      <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
        <h3 class="font-bold">
          <i class="fa-solid fa-book-open text-indigo-500 mr-1"></i>
          วิชาที่สอน — <span id="s-teacher-name" class="text-indigo-600"></span>
        </h3>
        <button onclick="closeSubModal()"
          class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <div class="bg-slate-50 rounded-xl p-4">
          <p class="text-xs font-semibold text-slate-500 mb-3">เพิ่มวิชาที่สอน</p>
          <div class="grid grid-cols-3 gap-2 mb-2">
            <div>
              <label class="block text-xs text-slate-400 mb-1">ปีการศึกษา</label>
              <select id="s-year"
                class="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-indigo-300">
                <option value="">— ปี —</option>
              </select>
            </div>
            <div>
              <label class="block text-xs text-slate-400 mb-1">รายวิชา</label>
              <select id="s-subject"
                class="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-indigo-300">
                <option value="">— เลือกวิชา —</option>
              </select>
            </div>
            <div>
              <label class="block text-xs text-slate-400 mb-1">ห้องเรียน</label>
              <select id="s-classroom"
                class="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-indigo-300">
                <option value="">— เลือกห้อง —</option>
              </select>
            </div>
          </div>
          <button onclick="addAssignment()"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-1.5 rounded-lg text-xs font-semibold transition">
            <i class="fa-solid fa-plus mr-1"></i>เพิ่ม
          </button>
        </div>
        <div>
          <p class="text-xs font-semibold text-slate-500 mb-2">วิชาที่กำหนดอยู่</p>
          <div id="s-list" class="space-y-1.5 max-h-52 overflow-y-auto pr-1">
            <p class="text-xs text-slate-400 text-center py-3">กำลังโหลด...</p>
          </div>
        </div>
      </div>
      <div class="px-5 py-3 border-t border-slate-100 flex justify-end">
        <button onclick="closeSubModal()"
          class="px-4 py-2 text-sm font-semibold bg-slate-100 hover:bg-slate-200 rounded-lg transition">ปิด</button>
      </div>
    </div>
  </div>

  <script>
    const SB_URL = "https://dazypxnsfwdwrqluicbc.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhenlweG5zZndkd3JxbHVpY2JjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxNDkzMDIsImV4cCI6MjA4MjcyNTMwMn0.hAxjy_poDer5ywgRAZwzTkXF-OAcpduLxESW3v5adxo";
    const ADMIN_PW = "admin2568"; // เปลี่ยนรหัส admin ได้ที่นี่
    const db = window.supabase.createClient(SB_URL, SB_KEY);

    // ─── Auth ────────────────────────────────────────────────────────
    function doLogin() {
      if (document.getElementById("admin-pass").value === ADMIN_PW) {
        sessionStorage.setItem("at_admin", "1");
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("shell").classList.remove("hidden");
        init();
      } else {
        Swal.fire({ icon: "error", title: "รหัสผ่านไม่ถูกต้อง", timer: 2000, showConfirmButton: false });
      }
    }
    function doLogout() { sessionStorage.removeItem("at_admin"); location.reload(); }
    document.getElementById("admin-pass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    if (sessionStorage.getItem("at_admin") === "1") {
      document.getElementById("login-screen").classList.add("hidden");
      document.getElementById("shell").classList.remove("hidden");
    }

    // ─── State ───────────────────────────────────────────────────────
    let teachers = [], subjects = [], classrooms = [], tsMap = {};

    async function init() {
      const [tR, sR, cR, tsR, tsYearR] = await Promise.all([
        db.from("teachers").select("id,name,username,position,is_active").order("name"),
        db.from("subjects").select("id,code,name").order("code"),
        db.from("classrooms").select("id,name,grade,level").order("grade").order("name"),
        db.from("teacher_subjects").select("teacher_id"),
        db.from("teacher_subjects").select("academic_year")
      ]);
      teachers = tR.data || [];
      subjects = sR.data || [];
      classrooms = cR.data || [];
      tsMap = {};
      (tsR.data || []).forEach(r => { tsMap[r.teacher_id] = (tsMap[r.teacher_id] || 0) + 1; });

      // สร้าง dropdown ปีการศึกษาจาก teacher_subjects
      const uniqueYears = [...new Set((tsYearR.data || []).map(r => r.academic_year).filter(Boolean))].sort((a,b) => b.localeCompare(a));
      const syEl = document.getElementById("s-year");
      if (syEl) syEl.innerHTML = uniqueYears.map(y => `<option value="${y}">${y}</option>`).join("") || `<option value="2568">2568</option>`;

      renderStats();
      renderTable(teachers);
      fillDropdowns();
    }

    function renderStats() {
      document.getElementById("stat-total").textContent = teachers.length;
      document.getElementById("stat-active").textContent = teachers.filter(t => t.is_active).length;
      document.getElementById("stat-inactive").textContent = teachers.filter(t => !t.is_active).length;
    }

    function filterTeachers() {
      const q = document.getElementById("q").value.toLowerCase();
      renderTable(teachers.filter(t => t.name.toLowerCase().includes(q) || t.username.toLowerCase().includes(q)));
    }

    function renderTable(list) {
      const tbody = document.getElementById("tbody");
      if (!list.length) {
        tbody.innerHTML = "<tr><td colspan='6' class='text-center py-10 text-slate-400'>ไม่พบข้อมูล</td></tr>";
        return;
      }
      tbody.innerHTML = list.map((t, i) => `
    <tr class="${i % 2 ? "bg-slate-50/40" : ""} border-b border-slate-50 hover:bg-violet-50/30 transition">
      <td class="px-4 py-3 font-medium">${t.name}</td>
      <td class="px-4 py-3 text-slate-500 font-mono text-xs">${t.username}</td>
      <td class="px-4 py-3 text-slate-500 text-xs">${t.position || "ครู"}</td>
      <td class="px-4 py-3 text-center">
        <button onclick="openSubModal(${t.id},'${t.name.replace(/'/g, "\'")}') "
          class="inline-flex items-center gap-1 px-2.5 py-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs rounded-lg transition">
          <i class="fa-solid fa-book-open text-[10px]"></i> ${tsMap[t.id] || 0} วิชา
        </button>
      </td>
      <td class="px-4 py-3 text-center">
        <button onclick="toggleActive(${t.id},${t.is_active})"
          class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold transition
          ${t.is_active ? "bg-emerald-100 text-emerald-700 hover:bg-emerald-200" : "bg-red-100 text-red-600 hover:bg-red-200"}">
          <i class="fa-solid ${t.is_active ? "fa-circle-check" : "fa-circle-xmark"} text-[10px]"></i>
          ${t.is_active ? "เปิดใช้งาน" : "ปิดใช้งาน"}
        </button>
      </td>
      <td class="px-4 py-3">
        <div class="flex items-center justify-center gap-1">
          <button onclick="openTeacherModal(${t.id})" title="แก้ไข"
            class="w-7 h-7 rounded-lg bg-amber-50 hover:bg-amber-100 text-amber-700 flex items-center justify-center transition">
            <i class="fa-solid fa-pen text-xs"></i>
          </button>
          <button onclick="resetPw(${t.id},'${t.name.replace(/'/g, "\'")}') " title="รีเซ็ตรหัส"
            class="w-7 h-7 rounded-lg bg-blue-50 hover:bg-blue-100 text-blue-700 flex items-center justify-center transition">
            <i class="fa-solid fa-key text-xs"></i>
          </button>
          <button onclick="deleteTeacher(${t.id},'${t.name.replace(/'/g, "\'")}') " title="ลบ"
            class="w-7 h-7 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 flex items-center justify-center transition">
            <i class="fa-solid fa-trash text-xs"></i>
          </button>
        </div>
      </td>
    </tr>`).join("");
    }

    // ─── Toggle / Delete / Reset ─────────────────────────────────────
    async function toggleActive(id, cur) {
      const { error } = await db.from("teachers").update({ is_active: !cur }).eq("id", id);
      if (error) { Swal.fire({ icon: "error", title: "เกิดข้อผิดพลาด", text: error.message }); return; }
      const t = teachers.find(x => x.id === id); if (t) t.is_active = !cur;
      renderStats(); renderTable(teachers);
      Swal.fire({ icon: "success", title: (!cur ? "เปิด" : "ปิด") + "ใช้งานแล้ว", timer: 1500, showConfirmButton: false });
    }

    async function deleteTeacher(id, name) {
      const r = await Swal.fire({
        icon: "warning", title: "ลบครู '" + name + "'?",
        text: "ข้อมูลการสอนและคะแนนที่เกี่ยวข้องจะถูกลบทั้งหมด",
        showCancelButton: true, confirmButtonColor: "#dc2626",
        confirmButtonText: "ลบเลย", cancelButtonText: "ยกเลิก"
      });
      if (!r.isConfirmed) return;
      const { error } = await db.from("teachers").delete().eq("id", id);
      if (error) { Swal.fire({ icon: "error", title: "ลบไม่สำเร็จ", text: error.message }); return; }
      teachers = teachers.filter(t => t.id !== id);
      renderStats(); renderTable(teachers);
      Swal.fire({ icon: "success", title: "ลบสำเร็จ", timer: 1500, showConfirmButton: false });
    }

    async function resetPw(id, name) {
      const { value: pw } = await Swal.fire({
        title: "รีเซ็ตรหัสผ่าน — " + name,
        input: "password", inputLabel: "รหัสผ่านใหม่",
        inputPlaceholder: "กรอกรหัสผ่านใหม่",
        showCancelButton: true, confirmButtonText: "บันทึก", cancelButtonText: "ยกเลิก",
        inputValidator: v => !v && "กรุณากรอกรหัสผ่าน"
      });
      if (!pw) return;
      const { error } = await db.from("teachers").update({ password_hash: pw }).eq("id", id);
      if (error) { Swal.fire({ icon: "error", title: "เกิดข้อผิดพลาด", text: error.message }); return; }
      Swal.fire({ icon: "success", title: "รีเซ็ตรหัสผ่านสำเร็จ", timer: 1800, showConfirmButton: false });
    }

    // ─── Teacher Modal ────────────────────────────────────────────────
    function openTeacherModal(id = null) {
      document.getElementById("m-id").value = "";
      document.getElementById("m-name").value = "";
      document.getElementById("m-username").value = "";
      document.getElementById("m-password").value = "";
      document.getElementById("m-active").checked = true;
      document.getElementById("m-position").value = "ครู";
      if (id) {
        const t = teachers.find(x => x.id === id);
        if (t) {
          document.getElementById("m-teacher-title").textContent = "แก้ไขข้อมูลครู";
          document.getElementById("m-id").value = id;
          document.getElementById("m-name").value = t.name;
          document.getElementById("m-username").value = t.username;
          document.getElementById("m-position").value = t.position || "ครู";
          document.getElementById("m-active").checked = t.is_active;
          document.getElementById("m-pass-req").classList.add("hidden");
          document.getElementById("m-pass-opt").classList.remove("hidden");
        }
      } else {
        document.getElementById("m-teacher-title").textContent = "เพิ่มครูใหม่";
        document.getElementById("m-pass-req").classList.remove("hidden");
        document.getElementById("m-pass-opt").classList.add("hidden");
      }
      document.getElementById("m-teacher").classList.remove("hidden");
    }
    function closeTeacherModal() { document.getElementById("m-teacher").classList.add("hidden"); }

    function togglePw() {
      const inp = document.getElementById("m-password");
      const eye = document.getElementById("pw-eye");
      if (inp.type === "password") { inp.type = "text"; eye.className = "fa-solid fa-eye-slash text-sm"; }
      else { inp.type = "password"; eye.className = "fa-solid fa-eye text-sm"; }
    }

    async function saveTeacher() {
      const id = document.getElementById("m-id").value;
      const name = document.getElementById("m-name").value.trim();
      const username = document.getElementById("m-username").value.trim();
      const password = document.getElementById("m-password").value;
      const position = document.getElementById("m-position").value;
      const isActive = document.getElementById("m-active").checked;
      if (!name || !username) { Swal.fire({ icon: "warning", title: "กรุณากรอกชื่อและ username", timer: 2000, showConfirmButton: false }); return; }
      if (!id && !password) { Swal.fire({ icon: "warning", title: "กรุณากรอกรหัสผ่าน", timer: 2000, showConfirmButton: false }); return; }
      const btn = document.getElementById("m-save");
      btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i>"; btn.disabled = true;
      try {
        if (id) {
          const upd = { name, username, position, is_active: isActive };
          if (password) upd.password_hash = password;
          const { error } = await db.from("teachers").update(upd).eq("id", parseInt(id));
          if (error) throw error;
          const t = teachers.find(x => x.id === parseInt(id)); if (t) Object.assign(t, { name, username, position, is_active: isActive });
        } else {
          const { data, error } = await db.from("teachers").insert({ name, username, password_hash: password, position, is_active: isActive }).select().single();
          if (error) throw error;
          teachers.push(data);
        }
        closeTeacherModal();
        renderStats(); renderTable(teachers);
        Swal.fire({ icon: "success", title: "บันทึกสำเร็จ", timer: 1500, showConfirmButton: false });
      } catch (e) {
        Swal.fire({ icon: "error", title: "บันทึกไม่สำเร็จ", text: e.message });
      } finally {
        btn.innerHTML = "บันทึก"; btn.disabled = false;
      }
    }

    // ─── Subject Modal ────────────────────────────────────────────────
    let curTeacherId = null;

    function fillDropdowns() {
      const ss = document.getElementById("s-subject");
      ss.innerHTML = "<option value=''>— เลือกวิชา —</option>";
      subjects.forEach(s => { const o = document.createElement("option"); o.value = s.id; o.textContent = s.code + " " + s.name; ss.appendChild(o); });
      const sc = document.getElementById("s-classroom");
      sc.innerHTML = "<option value=''>— เลือกห้อง —</option>";
      classrooms.forEach(c => { const o = document.createElement("option"); o.value = c.id; o.textContent = c.name; sc.appendChild(o); });
    }

    async function openSubModal(tid, name) {
      curTeacherId = tid;
      document.getElementById("s-teacher-name").textContent = name;
      document.getElementById("m-subject").classList.remove("hidden");
      await loadAssignments();
    }
    function closeSubModal() { document.getElementById("m-subject").classList.add("hidden"); curTeacherId = null; }

    async function loadAssignments() {
      const yr = document.getElementById("s-year").value;
      let query = db.from("teacher_subjects")
        .select("id, academic_year, subjects(code,name), classrooms(name)")
        .eq("teacher_id", curTeacherId)
        .order("id");
      if (yr) query = query.eq("academic_year", yr);
      const { data } = await query;
      const list = document.getElementById("s-list");
      if (!data || !data.length) {
        list.innerHTML = `<p class='text-xs text-slate-400 text-center py-3'>${yr ? "ยังไม่มีวิชาปี " + yr : "ยังไม่มีวิชาที่กำหนด"}</p>`; return;
      }
      list.innerHTML = data.map(r => `
    <div class="flex items-center justify-between bg-slate-50 rounded-xl px-3 py-2 border border-slate-100">
      <div>
        <span class="text-xs font-semibold text-indigo-700">${r.subjects?.code || ""}</span>
        <span class="text-xs text-slate-600 ml-1">${r.subjects?.name || ""}</span>
        <span class="text-xs text-slate-400 ml-2">→ ${r.classrooms?.name || ""}</span>
        ${r.academic_year ? `<span class="text-xs text-violet-500 ml-1">(${r.academic_year})</span>` : ""}
      </div>
      <button onclick="removeAssignment(${r.id})"
        class="w-6 h-6 rounded-lg bg-red-50 hover:bg-red-100 text-red-500 flex items-center justify-center transition">
        <i class="fa-solid fa-xmark text-xs"></i>
      </button>
    </div>`).join("");
    }

    async function addAssignment() {
      const sid = document.getElementById("s-subject").value;
      const cid = document.getElementById("s-classroom").value;
      const yr  = document.getElementById("s-year").value;
      if (!sid || !cid || !yr) { Swal.fire({ icon: "warning", title: "เลือกวิชา ห้องเรียน และปีการศึกษา", timer: 2000, showConfirmButton: false }); return; }
      const { error } = await db.from("teacher_subjects").insert({
        teacher_id:   curTeacherId,
        subject_id:   parseInt(sid),
        classroom_id: parseInt(cid),
        academic_year: yr
      });
      if (error) {
        Swal.fire({ icon: "error", title: error.code === "23505" ? "มีการกำหนดนี้อยู่แล้ว" : "เกิดข้อผิดพลาด", text: error.code !== "23505" ? error.message : "", timer: 2000, showConfirmButton: false });
        return;
      }
      tsMap[curTeacherId] = (tsMap[curTeacherId] || 0) + 1;
      await loadAssignments();
      renderTable(teachers);
    }

    async function removeAssignment(tsId) {
      const r = await Swal.fire({
        icon: "warning", title: "ลบการมอบหมายนี้?",
        showCancelButton: true, confirmButtonColor: "#dc2626", confirmButtonText: "ลบ", cancelButtonText: "ยกเลิก", reverseButtons: true
      });
      if (!r.isConfirmed) return;
      await db.from("teacher_subjects").delete().eq("id", tsId);
      if (tsMap[curTeacherId] > 0) tsMap[curTeacherId]--;
      await loadAssignments();
      renderTable(teachers);
    }

    // Auto-init
    if (sessionStorage.getItem("at_admin") === "1") init();

    document.getElementById("s-year")?.addEventListener("change", () => {
      if (curTeacherId) loadAssignments();
    });
  </script>
</body>

</html>
